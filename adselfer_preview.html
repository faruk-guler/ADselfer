<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADselfer - Reinforced SSPR Portal (Önizleme)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, #1e1b4b 0%, transparent 40%),
                        radial-gradient(circle at 80% 60%, #312e81 0%, transparent 40%);
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-dim);
            padding: 8px 16px;
            font-size: 0.9rem;
            border-radius: 8px;
            margin: 0;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            background: var(--glass-bg);
            color: var(--primary);
            border: 1px solid var(--glass-border);
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        .step {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .step.active {
            display: flex;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-left: 4px;
        }

        input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.5;
        }

        .error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 20px;
            min-height: 1.2rem;
        }

        .success-icon {
            font-size: 4rem;
            color: #22c55e;
            margin-bottom: 10px;
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 20px auto 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-hidden { display: none; }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <div class="card" id="app">
            <nav class="tabs">
                <button onclick="switchTab('reset')" class="tab-btn active" id="tab-reset">Şifre Sıfırla</button>
                <button onclick="switchTab('profile')" class="tab-btn" id="tab-profile">Profilim</button>
            </nav>

            <header>
                <h1>ADselfer</h1>
                <p id="sub-title">Güvenli Şifre Sıfırlama Portalı</p>
            </header>

            <!-- RESET SECTION -->
            <div id="reset-section">
                <!-- Step 1: User Lookup -->
                <div id="step-1" class="step active">
                    <div class="input-group">
                        <label for="username">Kullanıcı Adı</label>
                        <input type="text" id="username" placeholder="Örn: ahmet.yilmaz">
                    </div>
                    <button onclick="lookupUser()" id="btn-lookup">Devam Et</button>
                </div>

                <!-- Step 2: Verification -->
                <div id="step-2" class="step">
                    <p class="info">Lütfen <span id="email-hint"></span> adresine gönderilen kodu ve güvenlik cevabınızı girin.</p>
                    <div class="input-group">
                        <label for="otp">Doğrulama Kodu</label>
                        <input type="text" id="otp" maxlength="6" placeholder="000000">
                    </div>
                    <div class="input-group">
                        <label id="label-question">Güvenlik Sorusu</label>
                        <input type="text" id="answer" placeholder="Cevabınız">
                    </div>
                    <button onclick="verifyUser()">Doğrula</button>
                </div>

                <!-- Step 3: New Password -->
                <div id="step-3" class="step">
                    <div class="input-group">
                        <label for="new-password">Yeni Şifre</label>
                        <input type="password" id="new-password" placeholder="••••••••">
                    </div>
                    <div class="input-group">
                        <label for="confirm-password">Şifre Tekrar</label>
                        <input type="password" id="confirm-password" placeholder="••••••••">
                    </div>
                    <button onclick="resetPassword()">Şifreyi Güncelle</button>
                </div>
            </div>

            <!-- PROFILE SECTION -->
            <div id="profile-section" style="display: none;">
                <!-- Profile Login -->
                <div id="profile-login" class="step active">
                    <p class="info">Profilinizi düzenlemek için mevcut şifrenizle giriş yapın.</p>
                    <div class="input-group">
                        <label for="prof-username">Kullanıcı Adı</label>
                        <input type="text" id="prof-username" placeholder="Örn: ahmet.yilmaz">
                    </div>
                    <div class="input-group">
                        <label for="prof-password">Mevcut Şifre</label>
                        <input type="password" id="prof-password" placeholder="••••••••">
                    </div>
                    <button onclick="loginProfile()">Giriş Yap</button>
                </div>

                <!-- Profile Setup -->
                <div id="profile-setup" class="step">
                    <p class="info">Şifrenizi unutursanız kendinizi doğrulamak için bir güvenlik cevabı belirleyin.</p>
                    <div class="input-group">
                        <label>Güvenlik Sorusu</label>
                        <input type="text" disabled value="Güvenlik Sorunuz nedir?">
                    </div>
                    <div class="input-group">
                        <label for="new-answer">Cevabınız</label>
                        <input type="text" id="new-answer" placeholder="Cevabınız">
                    </div>
                    <button onclick="setupProfile()">Kaydet</button>
                </div>
            </div>

            <!-- Success Message -->
            <div id="success-screen" class="step">
                <div class="success-icon">✓</div>
                <h2 id="success-title">Başarılı!</h2>
                <p id="success-desc">İşleminiz başarıyla tamamlandı.</p>
                <button onclick="location.reload()">Başa Dön</button>
            </div>

            <div id="loader" class="loader-hidden"></div>
            <p id="error-msg" class="error"></p>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const isReset = tab === 'reset';
            document.getElementById('reset-section').style.display = isReset ? 'block' : 'none';
            document.getElementById('profile-section').style.display = isReset ? 'none' : 'block';
            
            document.getElementById('tab-reset').classList.toggle('active', isReset);
            document.getElementById('tab-profile').classList.toggle('active', !isReset);
            
            document.getElementById('sub-title').innerText = isReset 
                ? 'Güvenli Şifre Sıfırlama Portalı' 
                : 'Güvenlik Bilgilerinizi Güncelleyin';
            
            document.getElementById('error-msg').innerText = '';
            
            if (isReset) {
                showStep('step-1');
            } else {
                showStep('profile-login');
            }
        }

        function showStep(stepId) {
            const section = (stepId.startsWith('profile')) ? 'profile-section' : 
                            (stepId === 'success-screen' ? 'app' : 'reset-section');
            
            const scope = document.getElementById(section);
            scope.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
            document.getElementById('error-msg').innerText = '';
        }

        function toggleLoader(show) {
            const loader = document.getElementById('loader');
            loader.className = show ? 'loader' : 'loader-hidden';
            document.querySelectorAll('button').forEach(b => b.disabled = show);
        }

        function showError(msg) {
            document.getElementById('error-msg').innerText = msg;
        }

        // --- MOCKS ---

        function lookupUser() {
            const username = document.getElementById('username').value;
            if (!username) return showError('Lütfen kullanıcı adınızı girin.');
            toggleLoader(true);
            setTimeout(() => {
                toggleLoader(false);
                document.getElementById('email-hint').innerText = 'ah***@example.com';
                showStep('step-2');
            }, 800);
        }

        function verifyUser() {
            const otp = document.getElementById('otp').value;
            const answer = document.getElementById('answer').value;
            if (!otp || !answer) return showError('Lütfen tüm alanları doldurun.');
            toggleLoader(true);
            setTimeout(() => {
                toggleLoader(false);
                showStep('step-3');
            }, 800);
        }

        function resetPassword() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            if (newPassword !== confirmPassword) return showError('Şifreler uyuşmuyor.');
            toggleLoader(true);
            setTimeout(() => {
                toggleLoader(false);
                showStep('success-screen');
                document.getElementById('success-title').innerText = 'Şifre Değiştirildi!';
            }, 1000);
        }

        function loginProfile() {
            const username = document.getElementById('prof-username').value;
            const password = document.getElementById('prof-password').value;
            if (!username || !password) return showError('Lütfen bilgilerinizi girin.');
            toggleLoader(true);
            setTimeout(() => {
                toggleLoader(false);
                showStep('profile-setup');
            }, 800);
        }

        function setupProfile() {
            const answer = document.getElementById('new-answer').value;
            if (!answer) return showError('Cevap boş olamaz.');
            toggleLoader(true);
            setTimeout(() => {
                toggleLoader(false);
                showStep('success-screen');
                document.getElementById('success-title').innerText = 'Profil Güncellendi!';
                document.getElementById('success-desc').innerText = 'Güvenlik profiliniz başarıyla güncellendi.';
            }, 1000);
        }
    </script>
</body>
</html>
